name: Bug report
description: Report a software issue
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, R version, and any relevant details.
